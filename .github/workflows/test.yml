name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: orbit_shield
          POSTGRES_PASSWORD: orbit_shield
          POSTGRES_DB: orbit_shield
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U orbit_shield"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://orbit_shield:orbit_shield@localhost:5432/orbit_shield
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install libomp
        run: sudo apt-get update && sudo apt-get install -y libgomp1
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev,ml]"
      - name: Migrate
        working-directory: backend
        run: alembic upgrade head
      - name: Test
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
