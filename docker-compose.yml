services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: orbit-shield-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbit_shield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbit_shield}
      POSTGRES_DB: ${POSTGRES_DB:-orbit_shield}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit_shield}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orbit-shield-redis
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: orbit-shield-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orbit_shield}:${POSTGRES_PASSWORD:-orbit_shield}@postgres:5432/${POSTGRES_DB:-orbit_shield}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["8000:8000"]

  worker:
    build: ./backend
    container_name: orbit-shield-worker
    command: celery -A src.ingestion.tasks worker --loglevel=info
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orbit_shield}:${POSTGRES_PASSWORD:-orbit_shield}@postgres:5432/${POSTGRES_DB:-orbit_shield}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  beat:
    build: ./backend
    container_name: orbit-shield-beat
    command: celery -A src.ingestion.tasks beat --loglevel=info
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orbit_shield}:${POSTGRES_PASSWORD:-orbit_shield}@postgres:5432/${POSTGRES_DB:-orbit_shield}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: orbit-shield-frontend
    ports: ["5173:80"]
    depends_on: [api]

volumes:
  pgdata:
  redisdata:
