version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: collider-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: collider
      POSTGRES_PASSWORD: collider
      POSTGRES_DB: collider
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: collider-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
